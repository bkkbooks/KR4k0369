body:
  text: 盧綝晉四王遺事孝惠帝惠帝征成都王於安陽城北軍敗日已向中而太官未暇進食左右有齎秋桃十枚便以獻帝帝食三枚石超使人擘手奪三枚御覽九百六十七惠帝於鄴與成都王還洛陽出城倉卒上下無持資食之調道中有驅羊二百餘口者便勒將至洛得以為糧至洛盧志啟以右藏絹倍還羊主御覽八百十七成都王穎奉惠帝還洛陽道中於客舍作食宮人持斗餘粳米飯以供至尊大蒜鹽豉到獲嘉市麤米飯瓦盂盛之天子噉兩盂燥蒜數株鹽豉而已惠帝蒙塵洛陽黃門以瓦盂盛荼上至尊御覽七百六十又八百六十七引同惠帝征成都軍敗帝渴帳下齎五升銅灌就民家取水就灌飲之御覽七百十二書鈔一百三十五陳補引惠帝還洛陽道中有老公蒸雞素木槃中盛以奉帝御覽七百五十八惠帝還洛陽得鹿犢車一乘以單帛裙為幃御覽六百九十六惠帝與成都王自鄴還洛陽既至賜中書監盧志雲鶴綾袍一領書鈔一百二十九建武元年天子還洛陽右將軍張方啟陛下自鄴來還宜謁宗廟天子出因便劫啟移都其夜方悉引兵從西明廣陽諸門入自領五千騎皆捉鐵纏矟繫兜鍪燋茸皆用涼州白鶡毛望之若荼張方劫帝西遷國家有寶物詔右將軍載之於是放軍人八千餘人三日輦之尚不缺角真珍百餘斛張方移惠帝於長安兵人入殿取物持調御絹二疋幅自魏晉之積將百餘萬疋三日揵之尚不缺角御覽八百十七天子自鄴還洛右將軍張方逼帝幸長安河間王率參佐到霸水上迎大兵去路百餘步銜枚屯列御覽三百五十七惠帝到華陰河間王遣使上甘菓甘餔二百幡御覽八百五十二惠帝御成都王穎戰敗時舉輦司馬八人輦猶在肩士軍人競就殺舉輦者乘輿頓地帝傷三矢百僚奔散唯侍中嵇紹扶帝士將兵之帝曰吾吏也勿害之眾曰受太弟命唯不犯陛下一人耳遂斬之血汙帝袂將洗之帝曰嵇侍中血勿洗也水經蕩水注
